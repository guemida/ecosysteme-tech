<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>École IT — 27 métiers accessibles avec votre Bac+5</title>
  <meta name="description" content="Présentation interactive des 27 métiers accessibles avec un Bac+5 RNCP Niveau 7 en informatique. 2 spécialisations IA/Data et CyberSécu, reconnaissance européenne." />
  <meta name="theme-color" content="#0F172A" />

  <style>
    html, body { margin: 0; padding: 0; background: #050814; color: #F8FAFC; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    #root { min-height: 100vh; }
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, rgba(255,40,145,0.10), #050814);
      color: #F8FAFC; font-size: 22px; font-weight: 600; letter-spacing: -0.01em;
      z-index: 1000;
    }
    #boot .spin {
      width: 56px; height: 56px; border-radius: 50%;
      border: 4px solid rgba(248,250,252,0.12);
      border-top-color: #FF2891;
      animation: spin 900ms linear infinite;
      margin-right: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18.3.1",
      "react/jsx-runtime":"https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom":        "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "d3":               "https://esm.sh/d3@7.9.0",
      "recharts":         "https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1",
      "lucide-react":     "https://esm.sh/lucide-react@0.469.0?deps=react@18.3.1"
    }
  }
  </script>

</head>
<body>
  <div id="boot"><div class="spin"></div>Chargement…</div>
  <div id="root"></div>

  <script type="module" src="./app.js"></script>

  <script>
    // Hide boot screen once React has mounted
    const obs = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const boot = document.getElementById('boot');
        if (boot) {
          boot.style.transition = 'opacity 400ms ease';
          boot.style.opacity = '0';
          setTimeout(() => boot.remove(), 450);
        }
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
