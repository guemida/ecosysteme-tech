<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxia — Maquette Interactive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #06080f;
    --bg-surface: #0c1020;
    --bg-card: #111630;
    --bg-card-hover: #161d40;
    --border-subtle: rgba(100, 120, 200, 0.12);
    --border-active: rgba(100, 150, 255, 0.3);
    --text-primary: #e8ecf8;
    --text-secondary: #8890b0;
    --text-muted: #555e80;
    --accent-tech: #3b82f6;
    --accent-tech-glow: rgba(59, 130, 246, 0.25);
    --accent-metier: #f59e0b;
    --accent-metier-glow: rgba(245, 158, 11, 0.25);
    --accent-soft: #10b981;
    --accent-soft-glow: rgba(16, 185, 129, 0.25);
    --radius: 12px;
    --radius-sm: 8px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ══════════════ HEADER ══════════════ */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 60px;
    background: rgba(6, 8, 15, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-subtle);
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 18px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent-tech);
    box-shadow: 0 0 12px var(--accent-tech-glow);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  /* Search */
  .search-container {
    position: relative; width: 320px;
  }
  .search-input {
    width: 100%; padding: 8px 16px 8px 38px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 24px;
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: var(--transition);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus {
    border-color: var(--border-active);
    background: var(--bg-card);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
  }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 14px; pointer-events: none;
  }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    max-height: 300px; overflow-y: auto;
    display: none; z-index: 200;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .search-results.active { display: block; }
  .search-result-item {
    padding: 10px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border-subtle);
    transition: var(--transition);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg-card-hover); }
  .search-result-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .search-result-name { font-size: 13px; font-weight: 500; }
  .search-result-galaxy { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  /* Persona switch */
  .persona-switch {
    display: flex; gap: 4px;
    background: var(--bg-surface);
    padding: 3px; border-radius: 24px;
    border: 1px solid var(--border-subtle);
  }
  .persona-btn {
    padding: 6px 16px;
    border: none; border-radius: 20px;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
  }
  .persona-btn:hover { color: var(--text-primary); }
  .persona-btn.active {
    background: var(--bg-card);
    color: var(--text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* ══════════════ MAIN AREA ══════════════ */
  .main {
    position: relative;
    width: 100%; height: 100vh;
    padding-top: 60px;
  }

  /* Galaxy legend */
  .galaxy-legend {
    position: fixed; top: 76px; left: 24px; z-index: 50;
    display: flex; flex-direction: column; gap: 6px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    background: rgba(12, 16, 32, 0.8);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-subtle);
    border-radius: 20px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    user-select: none;
  }
  .legend-item:hover { background: var(--bg-card); }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .legend-count {
    color: var(--text-muted); font-size: 11px; margin-left: 4px;
    font-family: 'Space Mono', monospace;
  }

  /* Stats bar */
  .stats-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50;
    display: flex; gap: 24px;
    padding: 10px 28px;
    background: rgba(12, 16, 32, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-subtle);
    border-radius: 30px;
    font-size: 12px; color: var(--text-secondary);
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-value {
    font-family: 'Space Mono', monospace;
    font-weight: 700; color: var(--text-primary);
  }

  /* ══════════════ SVG CANVAS ══════════════ */
  #graph-canvas {
    width: 100%; height: 100%;
    cursor: grab;
  }
  #graph-canvas:active { cursor: grabbing; }

  /* Stars background */
  .star {
    fill: white; opacity: 0;
    animation: twinkle linear infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.5; }
  }

  /* ══════════════ SIDE PANEL ══════════════ */
  .side-panel {
    position: fixed; top: 60px; right: 0; bottom: 0;
    width: 400px;
    background: var(--bg-surface);
    border-left: 1px solid var(--border-subtle);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 90;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .side-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border-subtle);
    position: relative;
  }
  .panel-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px;
    border: 1px solid var(--border-subtle); border-radius: 8px;
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: var(--transition);
  }
  .panel-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }

  .panel-galaxy-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .panel-galaxy-tag.tech { background: rgba(59,130,246,0.12); color: var(--accent-tech); }
  .panel-galaxy-tag.metier { background: rgba(245,158,11,0.12); color: var(--accent-metier); }
  .panel-galaxy-tag.soft { background: rgba(16,185,129,0.12); color: var(--accent-soft); }

  .panel-title {
    font-size: 22px; font-weight: 700;
    margin-bottom: 4px;
  }

  .panel-body { padding: 20px 24px; flex: 1; }

  /* Tabs for description levels */
  .level-tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: var(--bg-card); padding: 3px; border-radius: 10px;
  }
  .level-tab {
    flex: 1; padding: 7px 0; text-align: center;
    border: none; border-radius: 8px;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
  }
  .level-tab:hover { color: var(--text-secondary); }
  .level-tab.active {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .description-text {
    font-size: 14px; line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  /* Specific data section */
  .section-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .data-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 20px;
  }
  .data-card {
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
  }
  .data-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .data-value {
    font-size: 13px; font-weight: 600; color: var(--text-primary);
  }

  /* Taught in */
  .taught-in-item {
    padding: 8px 12px; margin-bottom: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    font-size: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .taught-level {
    font-family: 'Space Mono', monospace;
    font-weight: 700; font-size: 12px;
  }
  .taught-depth {
    padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600;
  }
  .depth-decouverte { background: rgba(16,185,129,0.12); color: var(--accent-soft); }
  .depth-avance { background: rgba(245,158,11,0.12); color: var(--accent-metier); }
  .depth-expert { background: rgba(239,68,68,0.12); color: #ef4444; }

  /* Connections list */
  .connection-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border-subtle);
    cursor: pointer;
    transition: var(--transition);
  }
  .connection-item:hover { padding-left: 6px; }
  .connection-item:last-child { border-bottom: none; }
  .connection-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .connection-name { font-size: 13px; font-weight: 500; }
  .connection-strength {
    margin-left: auto; font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
  }

  /* Resources */
  .resource-link {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; margin-bottom: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--accent-tech);
    text-decoration: none;
    transition: var(--transition);
  }
  .resource-link:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-active);
  }

  /* Salary badge */
  .salary-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    margin-bottom: 20px;
  }
  .salary-card {
    text-align: center; padding: 10px 6px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
  }
  .salary-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .salary-value { font-size: 15px; font-weight: 700; color: var(--accent-metier); margin-top: 4px; }

  /* Keyboard hint */
  .keyboard-hint {
    position: fixed; bottom: 20px; right: 24px; z-index: 50;
    font-size: 11px; color: var(--text-muted);
    display: flex; flex-direction: column; gap: 3px; text-align: right;
  }
  kbd {
    display: inline-block; padding: 1px 6px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<header class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <span>Galaxia</span>
  </div>

  <div class="search-container">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" placeholder="Rechercher une techno, un métier, un skill..." id="searchInput">
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="persona-switch">
    <button class="persona-btn" data-persona="commercial" onclick="switchPersona('commercial')">🏢 Commercial</button>
    <button class="persona-btn active" data-persona="etudiant" onclick="switchPersona('etudiant')">🎓 Étudiant</button>
    <button class="persona-btn" data-persona="prospect" onclick="switchPersona('prospect')">🧭 Prospect</button>
  </div>
</header>

<!-- ══════════════ GALAXY LEGEND ══════════════ -->
<div class="galaxy-legend" id="galaxyLegend"></div>

<!-- ══════════════ MAIN GRAPH ══════════════ -->
<div class="main">
  <svg id="graph-canvas"></svg>
</div>

<!-- ══════════════ STATS BAR ══════════════ -->
<div class="stats-bar">
  <div class="stat-item"><span>Nœuds</span> <span class="stat-value" id="statNodes">0</span></div>
  <div class="stat-item"><span>Liens</span> <span class="stat-value" id="statLinks">0</span></div>
  <div class="stat-item"><span>Galaxies</span> <span class="stat-value">3</span></div>
  <div class="stat-item"><span>Instance</span> <span class="stat-value" style="color:var(--accent-tech)">École IT</span></div>
</div>

<!-- ══════════════ KEYBOARD HINTS ══════════════ -->
<div class="keyboard-hint">
  <span><kbd>Scroll</kbd> Zoom</span>
  <span><kbd>Click</kbd> Détail</span>
  <span><kbd>Esc</kbd> Fermer</span>
</div>

<!-- ══════════════ SIDE PANEL ══════════════ -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-galaxy-tag" id="panelTag"></div>
    <div class="panel-title" id="panelTitle"></div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA — Échantillon réaliste Galaxia École IT
// ══════════════════════════════════════════════

  { id: 'tech', name: 'Technologies', color: '#3b82f6', icon: '🚀' },
  { id: 'metier', name: 'Métiers', color: '#f59e0b', icon: '💼' },
  { id: 'soft', name: 'Soft Skills', color: '#10b981', icon: '🧠' },

const nodes = [

// ══════════════════════════════════════════════
//  GRAPH RENDERING
// ══════════════════════════════════════════════

const width = window.innerWidth;
const height = window.innerHeight;
const galaxyMap = {};
galaxies.forEach(g => galaxyMap[g.id] = g);

// Galaxy centers for initial clustering
const galaxyCenters = {
  tech: { x: width * 0.35, y: height * 0.5 },
  metier: { x: width * 0.72, y: height * 0.35 },
  soft: { x: width * 0.7, y: height * 0.7 },
};

// Prepare D3 data
const d3Nodes = nodes.map(n => ({
  ...n,
  x: galaxyCenters[n.galaxy].x + (Math.random() - 0.5) * 200,
  y: galaxyCenters[n.galaxy].y + (Math.random() - 0.5) * 200,
  r: n.galaxy === 'metier' ? 22 : n.galaxy === 'tech' ? 16 : 14,
}));

const d3Links = links.map(l => ({
  source: l.source,
  target: l.target,
  strength: l.strength,
}));

// Update stats
document.getElementById('statNodes').textContent = d3Nodes.length;
document.getElementById('statLinks').textContent = d3Links.length;

// Build legend
const legend = document.getElementById('galaxyLegend');
galaxies.forEach(g => {
  const count = nodes.filter(n => n.galaxy === g.id).length;
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.dataset.galaxy = g.id;
  el.innerHTML = `<div class="legend-dot" style="background:${g.color};box-shadow:0 0 6px ${g.color}40"></div>${g.icon} ${g.name}<span class="legend-count">${count}</span>`;
  el.onclick = () => toggleGalaxy(g.id);
  legend.appendChild(el);
});

// SVG setup
const svg = d3.select('#graph-canvas')
  .attr('width', width)
  .attr('height', height);

// Stars background
const starGroup = svg.append('g').attr('class', 'stars');
for (let i = 0; i < 200; i++) {
  starGroup.append('circle')
    .attr('class', 'star')
    .attr('cx', Math.random() * width)
    .attr('cy', Math.random() * height)
    .attr('r', Math.random() * 1.2 + 0.3)
    .style('animation-duration', (Math.random() * 4 + 2) + 's')
    .style('animation-delay', (Math.random() * 4) + 's');
}

// Container for zoom
const container = svg.append('g');

// Zoom behavior
const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on('zoom', (event) => {
    container.attr('transform', event.transform);
  });
svg.call(zoom);

// Links
const linkGroup = container.append('g').attr('class', 'links');
const linkElements = linkGroup.selectAll('line')
  .data(d3Links)
  .join('line')
  .attr('stroke', d => {
    const s = d3Nodes.find(n => n.id === (d.source.id || d.source));
    const t = d3Nodes.find(n => n.id === (d.target.id || d.target));
    if (s && t && s.galaxy !== t.galaxy) return '#444870';
    if (s) return galaxyMap[s.galaxy]?.color + '40';
    return '#333';
  })
  .attr('stroke-width', d => d.strength * 2 + 0.5)
  .attr('stroke-dasharray', d => {
    const s = d3Nodes.find(n => n.id === (d.source.id || d.source));
    const t = d3Nodes.find(n => n.id === (d.target.id || d.target));
    return (s && t && s.galaxy !== t.galaxy) ? '4,4' : 'none';
  });

// Node groups
const nodeGroup = container.append('g').attr('class', 'nodes');
const nodeElements = nodeGroup.selectAll('g')
  .data(d3Nodes)
  .join('g')
  .attr('class', 'node-group')
  .style('cursor', 'pointer')
  .call(d3.drag()
    .on('start', dragStarted)
    .on('drag', dragged)
    .on('end', dragEnded)
  )
  .on('click', (event, d) => {
    event.stopPropagation();
    openPanel(d);
  })
  .on('mouseenter', (event, d) => highlightConnections(d))
  .on('mouseleave', () => resetHighlight());

// Node glow
nodeElements.append('circle')
  .attr('class', 'node-glow')
  .attr('r', d => d.r + 8)
  .attr('fill', d => galaxyMap[d.galaxy].color)
  .attr('opacity', 0)
  .attr('filter', 'url(#glow)');

// Node circle
nodeElements.append('circle')
  .attr('class', 'node-circle')
  .attr('r', d => d.r)
  .attr('fill', d => galaxyMap[d.galaxy].color + '18')
  .attr('stroke', d => galaxyMap[d.galaxy].color)
  .attr('stroke-width', 1.5);

// Node icon
nodeElements.append('text')
  .attr('class', 'node-icon')
  .attr('text-anchor', 'middle')
  .attr('dominant-baseline', 'central')
  .attr('font-size', d => d.r * 0.85)
  .text(d => d.icon);

// Node label
nodeElements.append('text')
  .attr('class', 'node-label')
  .attr('text-anchor', 'middle')
  .attr('dy', d => d.r + 14)
  .attr('fill', '#c0c8e0')
  .attr('font-size', 11)
  .attr('font-weight', 500)
  .text(d => d.name);

// SVG filter for glow
const defs = svg.append('defs');
const filter = defs.append('filter').attr('id', 'glow');
filter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
filter.append('feMerge').selectAll('feMergeNode')
  .data(['blur', 'SourceGraphic'])
  .join('feMergeNode')
  .attr('in', d => d);

// Force simulation
const simulation = d3.forceSimulation(d3Nodes)
  .force('link', d3.forceLink(d3Links).id(d => d.id).distance(d => 100 / d.strength).strength(d => d.strength * 0.3))
  .force('charge', d3.forceManyBody().strength(-250))
  .force('x', d3.forceX(d => galaxyCenters[d.galaxy].x).strength(0.06))
  .force('y', d3.forceY(d => galaxyCenters[d.galaxy].y).strength(0.06))
  .force('collision', d3.forceCollide(d => d.r + 12))
  .on('tick', ticked);

function ticked() {
  linkElements
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
}

// Drag
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Hover highlight
function highlightConnections(d) {
  const connected = new Set();
  connected.add(d.id);
  d3Links.forEach(l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });

  nodeElements.transition().duration(200)
    .style('opacity', n => connected.has(n.id) ? 1 : 0.12);
  nodeElements.selectAll('.node-glow')
    .transition().duration(200)
    .attr('opacity', n => n.id === d.id ? 0.3 : 0);
  linkElements.transition().duration(200)
    .style('opacity', l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return (sid === d.id || tid === d.id) ? 1 : 0.05;
    })
    .attr('stroke-width', l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return (sid === d.id || tid === d.id) ? l.strength * 3 + 1 : l.strength * 2 + 0.5;
    });
}

function resetHighlight() {
  nodeElements.transition().duration(300).style('opacity', 1);
  nodeElements.selectAll('.node-glow').transition().duration(300).attr('opacity', 0);
  linkElements.transition().duration(300)
    .style('opacity', 1)
    .attr('stroke-width', d => d.strength * 2 + 0.5);
}

// ══════════════════════════════════════════════
//  SIDE PANEL
// ══════════════════════════════════════════════

let panelOpen = false;

function openPanel(d) {
  const panel = document.getElementById('sidePanel');
  const tag = document.getElementById('panelTag');
  const title = document.getElementById('panelTitle');
  const body = document.getElementById('panelBody');

  const g = galaxyMap[d.galaxy];
  tag.className = `panel-galaxy-tag ${d.galaxy === 'tech' ? 'tech' : d.galaxy === 'metier' ? 'metier' : 'soft'}`;
  tag.textContent = `${g.icon} ${g.name}`;
  title.textContent = `${d.icon} ${d.name}`;

  let html = '';

  // Description levels
  html += `
    <div class="level-tabs">
      <button class="level-tab active" onclick="switchLevel(this, 1)">Niveau 1</button>
      <button class="level-tab" onclick="switchLevel(this, 2)">Niveau 2</button>
      <button class="level-tab" onclick="switchLevel(this, 3)">Niveau 3</button>
    </div>
    <div class="description-text" id="descText">${d.desc1}</div>
  `;

  // Specific data
  if (d.galaxy === 'tech' && d.specific) {
    html += `<div class="section-title">Données techniques</div>
      <div class="data-grid">
        <div class="data-card"><div class="data-label">Difficulté</div><div class="data-value">${d.specific.difficulty}</div></div>
        <div class="data-card"><div class="data-label">Apprentissage</div><div class="data-value">${d.specific.learn_time}</div></div>
        <div class="data-card"><div class="data-label">Marché</div><div class="data-value">${d.specific.market_share}</div></div>
        <div class="data-card"><div class="data-label">Cas d'usage</div><div class="data-value">${d.specific.use_cases.join(', ')}</div></div>
      </div>`;

    if (d.taught_in && d.taught_in.length) {
      html += `<div class="section-title">Enseigné dans le programme</div>`;
      d.taught_in.forEach(t => {
        const depthClass = t.depth === 'Expert' ? 'depth-expert' : t.depth === 'Avancé' ? 'depth-avance' : 'depth-decouverte';
        html += `<div class="taught-in-item">
          <span><span class="taught-level">${t.level}</span> — ${t.semester} — ${t.module}</span>
          <span class="taught-depth ${depthClass}">${t.depth}</span>
        </div>`;
      });
    }
  }

  if (d.galaxy === 'metier' && d.specific) {
    const sal = d.specific.average_salary;
    html += `<div class="section-title">Salaires (€ brut/an)</div>
      <div class="salary-grid">
        <div class="salary-card"><div class="salary-label">Junior</div><div class="salary-value">${sal.junior}</div></div>
        <div class="salary-card"><div class="salary-label">Confirmé</div><div class="salary-value">${sal.confirme}</div></div>
        <div class="salary-card"><div class="salary-label">Senior</div><div class="salary-value">${sal.senior}</div></div>
      </div>
      <div class="data-grid">
        <div class="data-card"><div class="data-label">Marché</div><div class="data-value">${d.specific.job_market}</div></div>
        <div class="data-card"><div class="data-label">Niveau requis</div><div class="data-value">${d.specific.required_level}</div></div>
      </div>`;
    if (d.specific.sectors) {
      html += `<div class="section-title">Secteurs</div><div class="data-grid">`;
      d.specific.sectors.forEach(s => {
        html += `<div class="data-card"><div class="data-value" style="font-size:12px">${s}</div></div>`;
      });
      html += `</div>`;
    }
  }

  if (d.galaxy === 'soft' && d.specific) {
    html += `<div class="data-grid" style="margin-bottom:16px">
      <div class="data-card"><div class="data-label">Demande marché</div><div class="data-value">${d.specific.market_demand}</div></div>
      <div class="data-card"><div class="data-label">Comment la développer</div><div class="data-value" style="font-size:11px">${d.specific.how_to_develop}</div></div>
    </div>`;
    if (d.specific.context) {
      html += `<div class="section-title">Contextes</div><div class="data-grid">`;
      d.specific.context.forEach(c => {
        html += `<div class="data-card"><div class="data-value" style="font-size:12px">${c}</div></div>`;
      });
      html += `</div>`;
    }
  }

  // Connections
  const connections = [];
  links.forEach(l => {
    if (l.source === d.id || (l.source.id && l.source.id === d.id)) {
      const tid = l.target.id || l.target;
      const tNode = nodes.find(n => n.id === tid);
      if (tNode) connections.push({ node: tNode, strength: l.strength });
    }
    if (l.target === d.id || (l.target.id && l.target.id === d.id)) {
      const sid = l.source.id || l.source;
      const sNode = nodes.find(n => n.id === sid);
      if (sNode) connections.push({ node: sNode, strength: l.strength });
    }
  });

  if (connections.length) {
    html += `<div class="section-title" style="margin-top:20px">Connexions (${connections.length})</div>`;
    connections.sort((a, b) => b.strength - a.strength).forEach(c => {
      const color = galaxyMap[c.node.galaxy].color;
      html += `<div class="connection-item" onclick="navigateToNode('${c.node.id}')">
        <div class="connection-dot" style="background:${color}"></div>
        <span class="connection-name">${c.node.icon} ${c.node.name}</span>
        <span class="connection-strength">${(c.strength * 100).toFixed(0)}%</span>
      </div>`;
    });
  }

  // Resources
  if (d.resources && d.resources.length) {
    html += `<div class="section-title" style="margin-top:20px">Ressources</div>`;
    d.resources.forEach(r => {
      html += `<a href="${r.url}" target="_blank" class="resource-link">📎 ${r.title}</a>`;
    });
  }

  body.innerHTML = html;

  // Store current descriptions for tab switching
  body.dataset.desc1 = d.desc1;
  body.dataset.desc2 = d.desc2;
  body.dataset.desc3 = d.desc3;

  panel.classList.add('open');
  panelOpen = true;
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  panelOpen = false;
}

function switchLevel(btn, level) {
  document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const body = document.getElementById('panelBody');
  const desc = body.dataset[`desc${level}`];
  document.getElementById('descText').textContent = desc;
}

function navigateToNode(id) {
  const node = d3Nodes.find(n => n.id === id);
  if (node) {
    openPanel(node);
    // Zoom to node
    svg.transition().duration(600).call(
      zoom.transform,
      d3.zoomIdentity.translate(width / 2 - node.x, height / 2 - node.y).scale(1.2)
    );
  }
}

// ══════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (q.length < 2) { searchResults.classList.remove('active'); return; }

  const matches = nodes.filter(n =>
    n.name.toLowerCase().includes(q) ||
    n.desc1.toLowerCase().includes(q)
  ).slice(0, 8);

  if (matches.length === 0) { searchResults.classList.remove('active'); return; }

  searchResults.innerHTML = matches.map(n => {
    const g = galaxyMap[n.galaxy];
    return `<div class="search-result-item" onclick="selectSearchResult('${n.id}')">
      <div class="search-result-dot" style="background:${g.color}"></div>
      <span class="search-result-name">${n.icon} ${n.name}</span>
      <span class="search-result-galaxy">${g.name}</span>
    </div>`;
  }).join('');
  searchResults.classList.add('active');
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchResults.classList.remove('active'), 200);
});

function selectSearchResult(id) {
  searchInput.value = '';
  searchResults.classList.remove('active');
  navigateToNode(id);
}

// ══════════════════════════════════════════════
//  PERSONA SWITCH
// ══════════════════════════════════════════════

const personaConfig = {
  commercial: { primary: 'metier', label: 'Vue Commercial — Entrée Métiers' },
  etudiant: { primary: 'tech', label: 'Vue Étudiant — Entrée Technologies' },
  prospect: { primary: 'metier', label: 'Vue Prospect — Entrée Métiers' },
};

function switchPersona(persona) {
  document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-persona="${persona}"]`).classList.add('active');

  const config = personaConfig[persona];

  // Reposition galaxy centers based on persona
  const primaryGalaxy = config.primary;
  const newCenters = { ...galaxyCenters };

  if (primaryGalaxy === 'metier') {
    newCenters.metier = { x: width * 0.42, y: height * 0.48 };
    newCenters.tech = { x: width * 0.2, y: height * 0.5 };
    newCenters.soft = { x: width * 0.68, y: height * 0.5 };
  } else {
    newCenters.tech = { x: width * 0.38, y: height * 0.48 };
    newCenters.metier = { x: width * 0.72, y: height * 0.35 };
    newCenters.soft = { x: width * 0.7, y: height * 0.68 };
  }

  // Update forces and bump sizes
  simulation.force('x', d3.forceX(d => newCenters[d.galaxy].x).strength(0.08));
  simulation.force('y', d3.forceY(d => newCenters[d.galaxy].y).strength(0.08));

  // Resize nodes based on persona focus
  d3Nodes.forEach(n => {
    if (n.galaxy === primaryGalaxy) n.r = n.galaxy === 'metier' ? 26 : 20;
    else n.r = n.galaxy === 'metier' ? 18 : n.galaxy === 'tech' ? 14 : 12;
  });

  nodeElements.selectAll('.node-circle')
    .transition().duration(600)
    .attr('r', d => d.r);
  nodeElements.selectAll('.node-glow')
    .transition().duration(600)
    .attr('r', d => d.r + 8);
  nodeElements.selectAll('.node-icon')
    .transition().duration(600)
    .attr('font-size', d => d.r * 0.85);
  nodeElements.selectAll('.node-label')
    .transition().duration(600)
    .attr('dy', d => d.r + 14);

  simulation.alpha(0.5).restart();
}

// ══════════════════════════════════════════════
//  GALAXY FILTER
// ══════════════════════════════════════════════

const hiddenGalaxies = new Set();

function toggleGalaxy(galaxyId) {
  const item = document.querySelector(`.legend-item[data-galaxy="${galaxyId}"]`);

  if (hiddenGalaxies.has(galaxyId)) {
    hiddenGalaxies.delete(galaxyId);
    item.classList.remove('dimmed');
  } else {
    hiddenGalaxies.add(galaxyId);
    item.classList.add('dimmed');
  }

  nodeElements.transition().duration(300)
    .style('opacity', d => hiddenGalaxies.has(d.galaxy) ? 0.06 : 1)
    .style('pointer-events', d => hiddenGalaxies.has(d.galaxy) ? 'none' : 'all');

  linkElements.transition().duration(300)
    .style('opacity', l => {
      const sg = (typeof l.source === 'object' ? l.source : d3Nodes.find(n => n.id === l.source))?.galaxy;
      const tg = (typeof l.target === 'object' ? l.target : d3Nodes.find(n => n.id === l.target))?.galaxy;
      return (hiddenGalaxies.has(sg) || hiddenGalaxies.has(tg)) ? 0.03 : 1;
    });
}

// ══════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
  if (e.key === '/' && !e.ctrlKey) {
    e.preventDefault();
    searchInput.focus();
  }
});

// Click on canvas closes panel
svg.on('click', () => { if (panelOpen) closePanel(); });

// Initial persona
switchPersona('etudiant');
</script>
