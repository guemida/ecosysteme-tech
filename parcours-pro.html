<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulateur de parcours pro — Maquette</title>
  <meta name="description" content="Auto-évaluation indicative de vos compétences IT et recommandations de modules — maquette pédagogique non contractuelle." />
  <meta name="theme-color" content="#0A0E1F" />

  <script type="importmap">
    {
      "imports": {
        "d3": "https://esm.sh/d3@7.9.0"
      }
    }
  </script>

  <style>
    :root {
      --bg:        #050814;
      --bg-elev:   #0F1428;
      --bg-card:   #121734;
      --fg:        #F8FAFC;
      --fg-dim:    #CBD5E1;
      --muted:     #8890B0;
      --border:    #1E2750;
      --pink:      #FF2891;
      --cyan:      #00D4FF;
      --success:   #10B981;
      --warn:      #F59E0B;
      --danger:    #EF4444;

      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 15px; line-height: 1.55;
      min-height: 100vh;
    }
    body {
      background:
        radial-gradient(ellipse 1100px 600px at 20% -10%, rgba(255,40,145,0.08), transparent 60%),
        radial-gradient(ellipse 800px 500px at 90% 100%, rgba(0,212,255,0.06), transparent 60%),
        var(--bg);
    }
    a { color: var(--cyan); }

    h1, h2, h3, h4 { margin: 0 0 0.5em; letter-spacing: -0.01em; }
    h1 { font-size: 28px; font-weight: 700; }
    h2 { font-size: 20px; font-weight: 700; }
    h3 { font-size: 17px; font-weight: 700; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 28px 80px; }
    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      .container { padding: 22px 16px 60px; }
    }

    /* ─── topbar ─── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      gap: 12px; flex-wrap: wrap;
    }
    .topbar-brand {
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--fg-dim); text-transform: uppercase;
    }
    .topbar-brand strong {
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
    }
    .topbar-steps { display: flex; gap: 14px; font-size: 13px; flex-wrap: wrap; }
    .topbar-step {
      color: var(--muted); padding: 4px 10px; border-radius: 999px;
      border: 1px solid transparent;
    }
    .topbar-step.active {
      color: var(--fg); background: var(--bg-card); border-color: var(--border);
    }

    /* ─── header par écran ─── */
    .hdr { margin-bottom: 28px; }
    .hdr h1 { margin-bottom: 6px; }
    .lede { color: var(--fg-dim); margin: 0; font-size: 15px; }

    /* ─── boutons ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: var(--r-sm);
      font: inherit; font-weight: 600; font-size: 14px;
      cursor: pointer; transition: all 150ms ease;
      border: 1px solid transparent; background: transparent; color: var(--fg);
    }
    .btn-primary { background: linear-gradient(90deg, var(--pink), #FF5BAA); color: var(--fg); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,40,145,0.3); }
    .btn-secondary {
      background: var(--bg-card); color: var(--fg-dim); border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-elev); color: var(--fg); }
    .btn-ghost {
      background: transparent; color: var(--muted); padding: 6px 0; font-size: 13px;
    }
    .btn-ghost:hover { color: var(--fg-dim); }

    .actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 28px; gap: 14px; flex-wrap: wrap;
    }

    /* ─── écran 1 : galaxie ─── */
    .galaxy-wrap {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      min-height: 520px;
    }
    #galaxy-svg { display: block; width: 100%; }
    .galaxy-legend {
      position: absolute; top: 16px; left: 16px; z-index: 10;
      background: rgba(15,20,40,0.85);
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 12px 14px; backdrop-filter: blur(6px);
    }
    .galaxy-legend-title {
      font-size: 12px; color: var(--fg-dim); margin-bottom: 8px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .galaxy-legend-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px;
    }
    .galaxy-legend-item {
      display: flex; align-items: center; gap: 6px; font-size: 12px;
    }
    .galaxy-legend-dot {
      width: 8px; height: 8px; border-radius: 999px; display: inline-block;
    }
    @media (max-width: 600px) {
      .galaxy-legend-grid { grid-template-columns: 1fr; }
    }

    /* ─── écran 2 : bilan ciblé ─── */
    .family-badge {
      display: inline-flex; align-items: center; padding: 4px 10px;
      border-radius: 999px; background: var(--fam-color, var(--bg-elev))22;
      border: 1px solid var(--fam-color, var(--border));
      color: var(--fam-color, var(--fg-dim));
      font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      width: max-content;
    }
    .bilan-skills {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 6px 22px;
    }
    .skill-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      align-items: center; gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .skill-row:last-child { border-bottom: none; }
    .skill-name { font-size: 14px; font-weight: 600; color: var(--fg); }
    .bilan-required {
      display: inline-block; margin-top: 2px;
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .level-radios { display: flex; gap: 6px; flex-wrap: wrap; }
    .level-radio { position: relative; cursor: pointer; user-select: none; }
    .level-radio input { position: absolute; opacity: 0; pointer-events: none; }
    .level-radio span {
      display: inline-block; padding: 6px 12px; border-radius: var(--r-sm);
      background: var(--bg-elev); color: var(--muted);
      border: 1px solid var(--border);
      font-size: 12px; font-weight: 600; transition: all 120ms;
    }
    .level-radio:hover span { color: var(--fg-dim); }
    .level-radio input:checked + span {
      background: var(--cyan); color: #042036; border-color: var(--cyan);
    }
    @media (max-width: 600px) {
      .skill-row { grid-template-columns: 1fr; }
    }

    /* ─── écran 3 : parcours visuel ─── */
    .parcours-svg-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 16px;
      margin-bottom: 24px;
      overflow-x: auto;
    }
    .parcours-svg { display: block; }
    .parcours-empty {
      color: var(--success); text-align: center; padding: 30px;
      font-weight: 600;
    }

    .parcours-acquired {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--success);
      border-radius: var(--r-lg);
      padding: 18px 22px;
      margin-bottom: 24px;
    }
    .parcours-acquired h3 { color: var(--success); margin-bottom: 10px; }
    .parcours-acquired-list {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .parcours-acquired-chip {
      display: inline-flex; align-items: center;
      padding: 5px 11px; border-radius: 999px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.4);
      color: var(--success);
      font-size: 12px; font-weight: 600;
    }
    .parcours-acquired-empty {
      color: var(--muted); font-style: italic; margin: 0;
    }

    /* ─── footer ─── */
    .disclaimer {
      max-width: 1200px; margin: 40px auto 0; padding: 0 28px 28px;
      color: var(--muted); font-size: 12px; text-align: center;
      border-top: 1px solid var(--border); padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="topbar-brand"><strong>Simulateur de parcours pro</strong> · maquette</div>
      <nav class="topbar-steps" id="topbar-steps">
        <span class="topbar-step" data-step="galaxy">1. Métier</span>
        <span class="topbar-step" data-step="bilan">2. Bilan</span>
        <span class="topbar-step" data-step="parcours">3. Parcours</span>
      </nav>
    </header>
    <main id="app">Chargement…</main>
  </div>

  <footer class="disclaimer">
    Auto-évaluation indicative — ne remplace pas un bilan de compétences agréé.
    Maquette pédagogique non contractuelle.
  </footer>

  <script type="module">
    import * as d3 from 'd3';
    import { JOB_BY_ID } from './data/jobs.js';
    import { JOBS_SKILLS_ATOMIC, SKILL_BY_ID } from './data/skills.js';
    import { computeParcours } from './lib/parcoursPro.js';

    /* ─── constantes ─── */
    const PERIMETER = ['j2','j4','j9','j10','j18','j20','j24','j27'];

    const FAMILY = {
      data:       { color: '#3B82F6', label: 'Data' },
      ia:         { color: '#8B5CF6', label: 'IA / ML' },
      dev:        { color: '#06B6D4', label: 'Développement' },
      sec:        { color: '#F97316', label: 'Cybersécurité' },
      reseau:     { color: '#EF4444', label: 'Réseaux' },
      cloud:      { color: '#10B981', label: 'Cloud' },
      management: { color: '#EC4899', label: 'Management IT' }
    };
    const FAM_FALLBACK = { color: '#888', label: 'inconnu' };
    const PERIMETER_FAMILIES = ['data','ia','dev','reseau','cloud','management'];

    const LEVEL_LABELS     = ['—', 'Notion', 'Pratique', 'Expert'];
    const LEVEL_REQ_LABELS = ['', 'Notion', 'Pratique', 'Expert'];
    const SS_KEY = 'parcours-pro-state-v2';

    /* ─── état + persistance ─── */
    const state = {
      screen: 'galaxy',          // 'galaxy' | 'bilan' | 'parcours'
      selectedJobId: null,
      userLevels: {}             // skill_id → 1..3
    };

    function saveState() {
      try { sessionStorage.setItem(SS_KEY, JSON.stringify(state)); } catch {}
    }
    function loadState() {
      try {
        const raw = sessionStorage.getItem(SS_KEY);
        if (raw) Object.assign(state, JSON.parse(raw));
      } catch {}
    }

    /* ─── helpers ─── */
    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }
    function navigate(screen) {
      state.screen = screen;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function familyOf(family) {
      return FAMILY[family] || FAM_FALLBACK;
    }
    function truncate(s, n) {
      return s.length > n ? s.slice(0, n - 1) + '…' : s;
    }

    /* ─── ÉCRAN 1 : galaxie (D3 force layout, porté de app.jsx ConstellationScreen) ─── */

    function renderGalaxy() {
      const legendItems = PERIMETER_FAMILIES.map(k => {
        const f = FAMILY[k];
        return `
          <div class="galaxy-legend-item">
            <span class="galaxy-legend-dot" style="background:${f.color};box-shadow:0 0 8px ${f.color};"></span>
            <span>${escHtml(f.label)}</span>
          </div>`;
      }).join('');

      return `
        <section class="screen-galaxy">
          <header class="hdr">
            <h1>Choisissez votre métier cible</h1>
            <p class="lede">8 métiers IT du périmètre. Cliquez sur un métier pour démarrer le bilan ciblé.</p>
          </header>
          <div id="galaxy-wrap" class="galaxy-wrap">
            <div class="galaxy-legend">
              <div class="galaxy-legend-title">Familles</div>
              <div class="galaxy-legend-grid">${legendItems}</div>
            </div>
            <svg id="galaxy-svg"></svg>
          </div>
        </section>`;
    }

    function initGalaxy() {
      const wrap = document.getElementById('galaxy-wrap');
      const svgEl = document.getElementById('galaxy-svg');
      if (!wrap || !svgEl) return;

      const width  = wrap.clientWidth;
      const height = 520;

      const svg = d3.select(svgEl);
      svg.selectAll('*').remove();
      svg.attr('viewBox', `0 0 ${width} ${height}`).attr('width', width).attr('height', height);

      // glow
      const defs = svg.append('defs');
      const f = defs.append('filter').attr('id', 'glowNode')
        .attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
      f.append('feGaussianBlur').attr('stdDeviation', 5).attr('result', 'b');
      const fm = f.append('feMerge');
      fm.append('feMergeNode').attr('in', 'b');
      fm.append('feMergeNode').attr('in', 'SourceGraphic');

      // étoiles
      const starsG = svg.append('g');
      for (let i = 0; i < 70; i++) {
        starsG.append('circle')
          .attr('cx', Math.random() * width)
          .attr('cy', Math.random() * height)
          .attr('r', Math.random() * 1.4 + 0.2)
          .attr('fill', '#E2E8F0')
          .attr('opacity', Math.random() * 0.5 + 0.1);
      }

      // nodes & links (passerelles filtrées sur le périmètre)
      const jobs = PERIMETER.map(jid => ({ ...JOB_BY_ID[jid] }));
      const linkSet = new Set();
      const links = [];
      jobs.forEach(j => (j.passerelles || []).forEach(p => {
        if (!PERIMETER.includes(p)) return;
        const key = [j.id, p].sort().join('|');
        if (linkSet.has(key)) return;
        linkSet.add(key);
        links.push({ source: j.id, target: p });
      }));

      const sizeFn = d => d.market_tension === 'penurie' ? 28 : d.market_tension === 'tendu' ? 22 : 17;

      const linkG = svg.append('g').selectAll('line').data(links).join('line')
        .attr('stroke', '#64748B').attr('stroke-opacity', 0.22).attr('stroke-width', 1);

      const nodeG = svg.append('g').selectAll('g').data(jobs).join('g')
        .style('cursor', 'pointer').style('opacity', 0)
        .on('click', (e, d) => {
          state.selectedJobId = d.id;
          navigate('bilan');
        });

      nodeG.append('circle')
        .attr('r', d => sizeFn(d) + 8)
        .attr('fill', d => familyOf(d.family).color)
        .attr('opacity', 0.22)
        .attr('filter', 'url(#glowNode)');

      nodeG.append('circle')
        .attr('r', sizeFn)
        .attr('fill', d => familyOf(d.family).color)
        .attr('stroke', '#F8FAFC')
        .attr('stroke-width', 2);

      nodeG.append('text')
        .text(d => d.short)
        .attr('dy', d => sizeFn(d) + 18)
        .attr('text-anchor', 'middle')
        .attr('fill', '#F8FAFC')
        .attr('font-size', 13)
        .attr('font-weight', 600)
        .style('pointer-events', 'none')
        .style('paint-order', 'stroke')
        .style('stroke', 'rgba(2,6,23,0.85)')
        .style('stroke-width', 3);

      nodeG.transition().delay((d, i) => i * 60).duration(450).style('opacity', 1);

      d3.forceSimulation(jobs)
        .force('link',      d3.forceLink(links).id(d => d.id).distance(120).strength(0.18))
        .force('charge',    d3.forceManyBody().strength(-340))
        .force('center',    d3.forceCenter(width / 2, height / 2))
        .force('x',         d3.forceX(d => {
          const t1 = d.titleIds.includes('t1') && !d.titleIds.includes('t2');
          const t2 = d.titleIds.includes('t2') && !d.titleIds.includes('t1');
          if (t1) return width * 0.30;
          if (t2) return width * 0.70;
          return width * 0.50;
        }).strength(0.28))
        .force('y',         d3.forceY(height / 2).strength(0.08))
        .force('collision', d3.forceCollide(d => sizeFn(d) + 16))
        .on('tick', () => {
          linkG.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
               .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
          nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
        });
    }

    function attachGalaxyHandlers() {
      initGalaxy();
    }

    /* ─── ÉCRAN 2 : bilan ciblé ─── */

    function renderBilan() {
      const job = JOB_BY_ID[state.selectedJobId];
      const fam = familyOf(job.family);
      const required = JOBS_SKILLS_ATOMIC[state.selectedJobId];

      const skillsHtml = required.map(({ id, level: lvlReq }) => {
        const skill = SKILL_BY_ID[id];
        const acquired = state.userLevels[id] || 0;
        const radios = [0, 1, 2, 3].map(lv => `
          <label class="level-radio">
            <input type="radio" name="lvl-${escHtml(id)}" value="${lv}"
                   data-skill="${escHtml(id)}" ${acquired === lv ? 'checked' : ''} />
            <span>${LEVEL_LABELS[lv]}</span>
          </label>`).join('');
        return `
          <div class="skill-row">
            <div>
              <div class="skill-name">${escHtml(skill?.name || id)}</div>
              <span class="bilan-required">requis · ${LEVEL_REQ_LABELS[lvlReq]}</span>
            </div>
            <div class="level-radios">${radios}</div>
          </div>`;
      }).join('');

      return `
        <section class="screen-bilan">
          <header class="hdr">
            <button class="btn btn-ghost" id="btn-back-galaxy">← Choisir un autre métier</button>
            <span class="family-badge" style="--fam-color:${fam.color}; color:${fam.color}; border-color:${fam.color};">
              ${escHtml(fam.label)}
            </span>
            <h1 style="margin-top:8px;">Bilan : ${escHtml(job.name)}</h1>
            <p class="lede">Pour chacune des ${required.length} compétences attendues, indiquez votre niveau réel.</p>
          </header>

          <div class="bilan-skills">${skillsHtml}</div>

          <div class="actions">
            <button class="btn btn-secondary" id="btn-back-galaxy-2">← Métier</button>
            <button class="btn btn-primary" id="btn-parcours">Voir mon parcours →</button>
          </div>
        </section>`;
    }

    function attachBilanHandlers() {
      const goGalaxy = () => navigate('galaxy');
      document.getElementById('btn-back-galaxy')?.addEventListener('click', goGalaxy);
      document.getElementById('btn-back-galaxy-2')?.addEventListener('click', goGalaxy);
      document.getElementById('btn-parcours')?.addEventListener('click', () => navigate('parcours'));

      document.querySelectorAll('input[type=radio][data-skill]').forEach(input => {
        input.addEventListener('change', () => {
          const skill = input.dataset.skill;
          const level = parseInt(input.value, 10);
          if (level === 0) delete state.userLevels[skill];
          else state.userLevels[skill] = level;
          saveState();
        });
      });
    }

    /* ─── ÉCRAN 3 : parcours visuel SVG ─── */

    const COL_KEYS = ['M1-U1', 'M1-U2', 'M1-U3', 'M2-U1', 'M2-U2', 'M2-U3'];

    function buildParcoursLayout(modules) {
      const COL_W = 220, ROW_H = 95, NODE_W = 200, NODE_H = 75, PAD_X = 30, PAD_Y = 50;
      const colsMap = new Map(COL_KEYS.map(k => [k, []]));
      modules.forEach(m => {
        const k = `${m.year}-${m.unit}`;
        if (colsMap.has(k)) colsMap.get(k).push(m);
      });
      const cols = COL_KEYS.filter(k => colsMap.get(k).length > 0);

      const positions = {};
      let maxRows = 0;
      cols.forEach((k, ci) => {
        const list = colsMap.get(k);
        list.forEach((m, ri) => {
          const x = PAD_X + ci * COL_W;
          const y = PAD_Y + ri * ROW_H;
          positions[m.id] = {
            x, y,
            leftX:  x,            leftY:  y + NODE_H / 2,
            rightX: x + NODE_W,   rightY: y + NODE_H / 2
          };
        });
        if (list.length > maxRows) maxRows = list.length;
      });

      return {
        positions, cols,
        width:  PAD_X * 2 + cols.length * COL_W,
        height: PAD_Y + maxRows * ROW_H + 20,
        COL_W, NODE_W, NODE_H, PAD_X
      };
    }

    function renderParcoursSVG(modules, family) {
      if (modules.length === 0) {
        return `<p class="parcours-empty">Toutes les compétences sont déjà acquises au niveau requis.</p>`;
      }

      const fam = familyOf(family);
      const L = buildParcoursLayout(modules);

      const edgesHtml = modules.flatMap(m =>
        m.prerequisites.map(prereqId => {
          const p = L.positions[prereqId];
          const c = L.positions[m.id];
          if (!p || !c) return '';
          const x1 = p.rightX, y1 = p.rightY;
          const x2 = c.leftX,  y2 = c.leftY;
          const cx = (x1 + x2) / 2;
          return `<path d="M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}"
                        fill="none" stroke="${fam.color}" stroke-width="1.5" stroke-opacity="0.5"/>`;
        })
      ).join('');

      const headersHtml = L.cols.map((k, ci) => {
        const [yr, un] = k.split('-');
        const cx = L.PAD_X + ci * L.COL_W + L.NODE_W / 2;
        return `<text x="${cx}" y="30" text-anchor="middle" fill="#8890B0"
                      font-size="11" font-weight="700" letter-spacing="0.08em">${yr} · ${un}</text>`;
      }).join('');

      const nodesHtml = modules.map(m => {
        const p = L.positions[m.id];
        const n = m.skills_taught.length;
        return `
          <g transform="translate(${p.x},${p.y})">
            <rect width="${L.NODE_W}" height="${L.NODE_H}" rx="10"
                  fill="#121734" stroke="${fam.color}" stroke-width="1.5"/>
            <text x="14" y="22" fill="${fam.color}" font-size="11" font-weight="700">
              ${escHtml(m.id)} · ${m.days}j
            </text>
            <text x="14" y="42" fill="#F8FAFC" font-size="13" font-weight="600">
              ${escHtml(truncate(m.name, 28))}
            </text>
            <text x="14" y="62" fill="#8890B0" font-size="11">
              ${n} skill${n > 1 ? 's' : ''} couverte${n > 1 ? 's' : ''}
            </text>
          </g>`;
      }).join('');

      return `
        <svg class="parcours-svg" viewBox="0 0 ${L.width} ${L.height}"
             width="${L.width}" height="${L.height}">
          ${edgesHtml}
          ${headersHtml}
          ${nodesHtml}
        </svg>`;
    }

    function renderParcours() {
      const result = computeParcours(state.selectedJobId, state.userLevels);
      const fam = familyOf(result.family);
      const total = result.match.acquired.length + result.match.missing.length;

      const acquiredHtml = result.match.acquired.length === 0
        ? `<p class="parcours-acquired-empty">Aucune compétence déjà acquise pour ce métier.</p>`
        : result.match.acquired
            .map(s => `<span class="parcours-acquired-chip">${escHtml(s.name)}</span>`)
            .join('');

      return `
        <section class="screen-parcours">
          <header class="hdr">
            <button class="btn btn-ghost" id="btn-back-bilan">← Modifier mon bilan</button>
            <span class="family-badge" style="--fam-color:${fam.color}; color:${fam.color}; border-color:${fam.color};">
              ${escHtml(fam.label)}
            </span>
            <h1 style="margin-top:8px;">
              Votre parcours vers <span style="color:${fam.color};">${escHtml(result.jobName)}</span>
            </h1>
            <p class="lede">
              <strong>${result.match.percent}%</strong> compatible ·
              <strong>${result.modules.length}</strong> module${result.modules.length > 1 ? 's' : ''} à suivre ·
              <strong>${result.totalDays}j (~${result.totalHours}h)</strong>
            </p>
          </header>

          <div class="parcours-svg-wrap">
            ${renderParcoursSVG(result.modules, result.family)}
          </div>

          <div class="parcours-acquired">
            <h3>Déjà acquis (${result.match.acquired.length} / ${total})</h3>
            <div class="parcours-acquired-list">${acquiredHtml}</div>
          </div>

          <div class="actions">
            <button class="btn btn-secondary" id="btn-back-bilan-2">← Retour au bilan</button>
            <button class="btn btn-primary" id="btn-back-galaxy">Choisir un autre métier</button>
          </div>
        </section>`;
    }

    function attachParcoursHandlers() {
      const goBilan = () => navigate('bilan');
      document.getElementById('btn-back-bilan')?.addEventListener('click', goBilan);
      document.getElementById('btn-back-bilan-2')?.addEventListener('click', goBilan);
      document.getElementById('btn-back-galaxy')?.addEventListener('click', () => navigate('galaxy'));
    }

    /* ─── render principal ─── */
    const RENDERERS = { galaxy: renderGalaxy, bilan: renderBilan, parcours: renderParcours };
    const HANDLERS  = { galaxy: attachGalaxyHandlers, bilan: attachBilanHandlers, parcours: attachParcoursHandlers };

    function render() {
      // self-correction : bilan/parcours sans selectedJobId → galaxie
      if (state.screen !== 'galaxy' && !state.selectedJobId) state.screen = 'galaxy';
      if (!RENDERERS[state.screen]) state.screen = 'galaxy';

      document.getElementById('app').innerHTML = RENDERERS[state.screen]();
      document.querySelectorAll('.topbar-step').forEach(el => {
        el.classList.toggle('active', el.dataset.step === state.screen);
      });
      HANDLERS[state.screen]();
    }

    /* ─── boot ─── */
    loadState();
    render();
  </script>
</body>
</html>
